version: '3.8'

services:
  user:
    image: docai/user-service:1.0.0
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      SPRING_APPLICATION_NAME: user
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos-infra:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-infra:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      SPRING_REDIS_HOST: redis-infra-infra
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      SPRING_RABBITMQ_HOST: rabbitmq-infra
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未设置}
      JWT_TOKEN_EXPIRATION: ${JWT_TOKEN_EXPIRATION:-30}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-24}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    networks:
      - documind_docai-network
    ports:
      - target: 18081
        published: 18081
        mode: host

  gateway:
    image: docai/gateway-service:1.0.0
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      SPRING_APPLICATION_NAME: gateway
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos-infra:8848
      SPRING_REDIS_HOST: redis-infra
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      SPRING_RABBITMQ_HOST: rabbitmq-infra
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未设置}
      JWT_TOKEN_EXPIRATION: ${JWT_TOKEN_EXPIRATION:-30}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-24}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    networks:
      - documind_docai-network
    ports:
      - target: 18080
        published: 18080
        mode: host

  # 文件服务
  file:
    image: docai/file-service:1.0.0
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      SPRING_APPLICATION_NAME: file
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos-infra:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-infra:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      SPRING_REDIS_HOST: redis-infra-infra
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      SPRING_RABBITMQ_HOST: rabbitmq-infra
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      MINIO_ENDPOINT: http://minio-infra:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO密码未设置}
      MINIO_BUCKET: ${MINIO_BUCKET:-docai-files}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未设置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    networks:
      - documind_docai-network
    ports:
      - target: 18082
        published: 18082
        mode: host

  # AI 服务
  ai:
    image: docai/ai-service:1.0.0
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      SPRING_APPLICATION_NAME: ai-service
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos-infra:8848
      # Redis配置（使用application.yml中的变量名）
      REDIS_HOST: redis-infra
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      SPRING_RABBITMQ_HOST: rabbitmq-infra
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      MINIO_ENDPOINT: http://minio-infra:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO密码未设置}
      MINIO_BUCKET: ${MINIO_BUCKET:-docai-files}
      # AI服务配置
      OPENAI_API_KEY: ${OPENAI_API_KEY:?DeepSeek API密钥未设置}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v3}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未设置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    networks:
      - documind_docai-network
    ports:
      - target: 18083
        published: 18083
        mode: host

networks:
  documind_docai-network:
    external: true