version: '3.8'

services:
  # ===== 基础设施 =====
  mysql:
    image: mysql:8.0
    container_name: documind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      MYSQL_DATABASE: doc_ai
    ports:
      - "23306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.0
    container_name: documind-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Redis密码未设置}
    ports:
      - "28379:6379"
    volumes:
      - redis-data:/data
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Redis密码未设置}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.8-management
    container_name: documind-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
    ports:
      - "28672:5672"
      - "29672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: documind-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MinIO密码未设置}
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: documind-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "18848:8848"
      - "19848:9848"
      - "19849:9849"
    networks:
      - documind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===== 微服务 (依赖基础设施健康检查) =====
  gateway:
    image: docai/gateway-service:1.0.0
    container_name: documind-gateway
    environment:
      SPRING_APPLICATION_NAME: gateway
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED: "false"
      SPRING_CLOUD_LOADBALANCER_CACHE_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      SPRING_AMQP_DESERIALIZATION_TRUST_ALL: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未配置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    ports:
      - "18080:18080"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - documind-net

  user:
    image: docai/user-service:1.0.0
    container_name: documind-user
    environment:
      SPRING_APPLICATION_NAME: user
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未配置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    ports:
      - "18081:18081"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - documind-net

  file:
    image: docai/file-service:1.0.0
    container_name: documind-file
    environment:
      SPRING_APPLICATION_NAME: file
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO密码未设置}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未配置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    ports:
      - "18082:18082"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - documind-net

  ai:
    image: docai/ai-service:1.0.0
    container_name: documind-ai
    environment:
      SPRING_APPLICATION_NAME: ai
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO密码未设置}
      # DeepSeek大模型API（对话、摘要、关键词提取）
      # 注意：base-url 不要包含 /v1，ChatService 会自动添加 /chat/completions
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?DeepSeek API密钥未配置}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
      # 阿里云百炼Embedding API（文档向量化、RAG检索）
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v3}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未配置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    ports:
      - "18083:18083"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - documind-net

  document:
    image: docai/document-service:1.0.0
    container_name: documind-document
    environment:
      SPRING_APPLICATION_NAME: document
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MySQL密码未设置}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis密码未设置}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RabbitMQ密码未设置}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MinIO密码未设置}
      JWT_SECRET: ${JWT_SECRET:?JWT密钥未配置}
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}
    ports:
      - "18084:18084"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - documind-net

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  documind-net:
    driver: bridge