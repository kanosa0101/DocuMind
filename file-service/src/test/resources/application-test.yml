server:
  port: 18082

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
  autoconfigure:
    exclude:
      - org.springframework.cloud.client.serviceregistry.ServiceRegistryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceRegistryAutoConfiguration
      - org.springframework.cloud.openfeign.FeignAutoConfiguration
      - org.springframework.amqp.rabbit.autoconfigure.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.javaee.fileservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: test-secret-key-for-unit-testing-must-be-at-least-256-bits-long-please-change-this-in-production
  token-expiration: 30
  refresh-token-expiration: 24

gateway:
  signature:
    secret: test-gateway-signature-secret-key-for-testing

minio:
  endpoint: http://localhost:9000
  access-key: test-access-key
  secret-key: test-secret-key
  bucket: test-bucket

logging:
  level:
    com.javaee: DEBUG