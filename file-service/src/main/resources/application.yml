spring:
  application:
    name: file
  
  datasource:
    url: jdbc:mysql://your_mysql_host:3306/doc_ai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: your_mysql_username
    password: your_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        enabled: true
        server-addr: your_nacos_host:8848
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  data:
    redis:
      host: your_redis_host
      port: 6379
      password: your_redis_password
      database: 1
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: your_rabbitmq_host
    port: 5672
    username: your_rabbitmq_username
    password: your_rabbitmq_password
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 1024MB
      max-request-size: 1024MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.javaee.fileservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8082
  servlet:
    context-path: /

minio:
  endpoint: http://your_minio_host:9000
  access-key: your_minio_access_key
  secret-key: your_minio_secret_key
  bucket-name: doc-ai
  secure: false

file:
  storage:
    type: minio
    local-path: /data/file-storage
    max-size: 1024
    allowed-types:
      - image/*
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/*

logging:
  level:
    com.javaee.fileservice: debug
    org.springframework.security: info

custom:
  jwt:
    header: Authorization
    prefix: Bearer
