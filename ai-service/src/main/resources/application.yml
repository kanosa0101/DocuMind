server:
  port: 18083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-service
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:doc_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=${MYSQL_USE_SSL:true}&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:admin123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      database: 1
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # DeepSeek API 配置 (OpenAI 兼容)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_API_BASE:https://api.deepseek.com}
      chat:
        options:
          model: ${OPENAI_MODEL:deepseek-v4-flash}
      embedding:
        options:
          model: text-embedding-v1
    # 阿里云百炼 dashscope API 配置（用于Embedding向量化）
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        model: ${DASHSCOPE_EMBEDDING_MODEL:tongyi-embedding-vision-flash-2026-03-06}
        dimension: 768

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:rabbit123}
    virtual-host: /

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# AI配置
ai:
  conversation:
    max-messages: 100
    expiry-hours: 24

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:minio123}
  bucket: ${MINIO_BUCKET:documents}
  url:
    expiry: 3600
  recycle:
    expiry-days: 7
  delete:
    confirmation-timeout: 300

# JWT配置
jwt:
  secret: ${JWT_SECRET:?JWT密钥未配置}

# 网关签名验证配置
gateway:
  signature:
    secret: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}

# 日志配置
logging:
  level:
    com.javaee.aiservice: ${LOG_LEVEL_APP:info}
    org.springframework.ai: info
    org.springframework.security: warn

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# SpringDoc配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
