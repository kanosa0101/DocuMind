version: '3.8'

services:
  # MySQL 服务
  mysql:
    image: mysql:8.0
    container_name: mysql-infra
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: doc_ai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - docai-network
    ports:
      - "23306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis 集群
  redis:
    image: redis:7.0
    container_name: redis-infra
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    command: redis-server --requirepass redis123 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - docai-network
    ports:
      - "28379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.8-management
    container_name: rabbitmq-infra
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: rabbit123
    networks:
      - docai-network
    ports:
      - "28672:5672"
      - "29672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MinIO
  minio:
    image: minio/minio
    container_name: minio-infra
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - docai-network
    ports:
      - "29000:9000"
      - "29001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: nacos-infra
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: admin123
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
    ports:
      - "28848:8848"
      - "29848:9848"
      - "29849:9849"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - docai-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  docai-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
  nacos-data: