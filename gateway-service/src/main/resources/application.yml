spring:
  application:
    name: gateway

  main:
    web-application-type: reactive

  cloud:
    compatibility-verifier:
      enabled: false
    loadbalancer:
      ribbon:
        enabled: false
      cache:
        enabled: true
      health-check:
        initial-delay: 0
    gateway:
      health:
        enabled: true
      httpclient:
        connect-timeout: 10000
        response-timeout: 60000

    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

    sentinel:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:?Redis密码未配置}
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:?RabbitMQ密码未配置}
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true

server:
  port: 18080

logging:
  level:
    org.springframework.cloud.gateway: info
    org.springframework.cloud.alibaba.sentinel: info

# JWT配置
jwt:
  secret: ${JWT_SECRET:?JWT密钥未配置}
  token-expiration: ${JWT_TOKEN_EXPIRATION:30}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:24}

# 网关路由配置 - 使用 Nacos 服务发现
gateway:
  route:
    user-uri: lb://user
    file-uri: lb://file
    ai-uri: lb://ai-service
    document-uri: lb://document
  signature:
    secret: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}

# CORS跨域配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5175,http://localhost:3000}

custom:
  jwt:
    header: Authorization
    prefix: Bearer

  rate-limit:
    enable: true
    redis-key-prefix: gateway:rate-limit
    default-rate: 100
    default-burst: 200