spring:
  application:
    name: user

  # 数据库配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:doc_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=${MYSQL_USE_SSL:true}&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:?MySQL密码未配置}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 禁用 Spring Cloud 兼容性检查
  cloud:
    compatibility-verifier:
      enabled: false
    # Nacos 服务注册发现配置
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:?Redis密码未配置}
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:?RabbitMQ密码未配置}
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.javaee.user.entity
  configuration:
    map-underscore-to-camel-case: true
    # 使用Slf4j日志实现，避免StdOutImpl在生产环境泄露敏感信息
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# 服务器配置
server:
  port: 18081
  address: 0.0.0.0
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    com.javaee.user: ${LOG_LEVEL_APP:info}
    org.springframework.security: warn

# JWT配置
jwt:
  secret: ${JWT_SECRET:?JWT密钥未配置}
  token-expiration: ${JWT_TOKEN_EXPIRATION:30}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:24}

# 网关签名验证配置
gateway:
  signature:
    secret: ${GATEWAY_SIGNATURE_SECRET:?Gateway签名密钥未配置}